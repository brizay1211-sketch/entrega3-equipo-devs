<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Empresa - Artículos</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <style>
    /* Estilos personalizados mínimos para mantener el comportamiento de mostrar/ocultar */
    #contenedorArticulo {
      display: none;
    }
    /* Opcional: ajustar ancho de los inputs dentro de las filas */
    .input-group-custom {
      max-width: 400px;
    }
  </style>
</head>
<body class="bg-light">
  <div class="container my-4">
    <!-- Sección para procesar artículo (oculto inicialmente) -->
    <section id="contenedorArticulo" class="card shadow-sm p-4 mb-5 mx-auto" style="max-width: 500px;">
      <h5 class="card-title text-center mb-4">Procesar Artículo</h5>
      <div class="mb-3">
        <label for="articulo_inCodigo" class="form-label">Código:</label>
        <input type="text" class="form-control" id="articulo_inCodigo" placeholder="Ej: 1">
      </div>
      <div class="mb-3">
        <label for="articulo_inCosto" class="form-label">Costo:</label>
        <input type="number" class="form-control" id="articulo_inCosto" placeholder="Ej: 100" step="0.01">
      </div>
      <div class="mb-3">
        <label for="articulo_inVenta" class="form-label">Venta:</label>
        <input type="number" class="form-control" id="articulo_inVenta" placeholder="Ej: 150" step="0.01">
      </div>
      <div class="mb-3">
        <label for="articulo_inPeso" class="form-label">Peso:</label>
        <input type="number" class="form-control" id="articulo_inPeso" placeholder="Ej: 150" step="0.01">
      </div>
      <div class="d-flex justify-content-end gap-2">
        <button class="btn btn-secondary" id="articulo_btCancelar">Cancelar</button>
        <button class="btn btn-primary" id="articulo_btAceptar">Aceptar</button>
      </div>
    </section>

    <hr class="my-4">

    <!-- Sección principal de la empresa -->
    <section id="contenedorEmpresa" class="card shadow-sm p-4 mx-auto" style="max-width: 600px;">
      <h2 class="text-center mb-4">Empresa - Gestión de Artículos</h2>
      <div class="d-grid gap-2 d-md-flex justify-content-md-center mb-4">
        <button class="btn btn-success btn-lg" id="empresa_btProcesar1Articulo">Procesar 1 Artículo</button>
      </div>

      <div class="card bg-light border-0">
        <div class="card-body">
          <h4 class="card-title">Último artículo procesado:</h4>
          <div class="row mb-2">
            <label for="empresa_inCodigo" class="col-sm-4 col-form-label">Código:</label>
            <div class="col-sm-8">
              <input type="text" readonly class="form-control-plaintext bg-white p-2 rounded" id="empresa_inCodigo" value="">
            </div>
          </div>
          <div class="row mb-2">
            <label for="empresa_inCosto" class="col-sm-4 col-form-label">Costo:</label>
            <div class="col-sm-8">
              <input type="text" readonly class="form-control-plaintext bg-white p-2 rounded" id="empresa_inCosto" value="">
            </div>
          </div>
          <div class="row mb-2">
            <label for="empresa_inVenta" class="col-sm-4 col-form-label">Venta:</label>
            <div class="col-sm-8">
              <input type="text" readonly class="form-control-plaintext bg-white p-2 rounded" id="empresa_inVenta" value="">
            </div>
          </div>
          <div class="row mb-2">
            <label for="empresa_inGanancia" class="col-sm-4 col-form-label">Ganancia:</label>
            <div class="col-sm-8">
              <input type="text" readonly class="form-control-plaintext bg-white p-2 rounded" id="empresa_inGanancia" value="">
            </div>
          </div>

          <h4 class="card-title mt-4">Estadísticas de la empresa:</h4>
          <div class="row mb-2">
            <label for="empresa_inTotalGanancia" class="col-sm-4 col-form-label">Total Ganancia:</label>
            <div class="col-sm-8">
              <input type="text" readonly class="form-control-plaintext bg-white p-2 rounded" id="empresa_inTotalGanancia" value="">
            </div>
          </div>
          <div class="row mb-2">
            <label for="empresa_inCantidadArticulos" class="col-sm-4 col-form-label">Cantidad Artículos:</label>
            <div class="col-sm-8">
              <input type="text" readonly class="form-control-plaintext bg-white p-2 rounded" id="empresa_inCantidadArticulos" value="">
            </div>
          </div>
          <div class="row mb-2">
            <label for="empresa_inArticuloMasCaro" class="col-sm-4 col-form-label">Artículo más caro:</label>
            <div class="col-sm-8">
              <input type="text" readonly class="form-control-plaintext bg-white p-2 rounded" id="empresa_inArticuloMasCaro" value="">
            </div>
          </div>
          <div class="row mb-2">
            <label for="empresa_inPromedioPeso" class="col-sm-4 col-form-label">Promedio de Peso:</label>
            <div class="col-sm-8">
              <input type="text" readonly class="form-control-plaintext bg-white p-2 rounded" id="empresa_inPromedioPeso" value="">
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <!-- Bootstrap JS (opcional, solo si se necesita interactividad de Bootstrap) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  
  <!-- Módulos de la aplicación -->
  <script type="module">
    import Cl_cEmpresa from "./dist/controllers/Cl_cEmpresa.js";
    import Cl_cArticulo from "./dist/controllers/Cl_cArticulo.js";
    import Cl_vEmpresa from "./dist/views/Cl_vEmpresa.js";
    import Cl_vArticulo from "./dist/views/Cl_vArticulo.js";

    document.addEventListener("DOMContentLoaded", () => {
      console.log("Inicializando aplicación de empresa...");
      
      try {
        const vistaEmpresa = new Cl_vEmpresa();
        const vistaArticulo = new Cl_vArticulo();

        const controladorArticulo = new Cl_cArticulo(vistaArticulo);
        new Cl_cEmpresa(vistaEmpresa, controladorArticulo);
        
        console.log("Aplicación de empresa inicializada correctamente");
      } catch (error) {
        console.error("Error al inicializar:", error);
      }
    });
  </script>
</body>
</html>
